name: Publish to npm

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC: GitHub generates id-token, npm verifies it for authentication
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build --workspace=packages/bot

      # npm automatically uses OIDC token from GitHub Actions
      # No NPM_TOKEN needed — provenance attestation signed by Sigstore
      - run: npm publish --workspace=packages/bot --provenance --access public
