name: Deploy EasyOref

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-easyoref
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 1. BUILD & PUSH
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build:
    name: "build:arm64"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/easyoref:latest
            ghcr.io/${{ github.repository_owner }}/easyoref:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 2. DEPLOY TO RPI
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy:
    name: "deploy:rpi"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.76.6

      - name: Get RPi Tailscale IP
        id: get_rpi_ip
        run: |
          RPI_IP=$(tailscale status --json | jq -r '.Peer[] | select(.HostName | test("raspberrypi"; "i")) | .TailscaleIPs[0]' | head -1)
          echo "ip=$RPI_IP" >> $GITHUB_OUTPUT

      - name: Deploy to RPi via SSH
        env:
          RPI_IP: ${{ steps.get_rpi_ip.outputs.ip }}
        run: |
          # Pull image on RPi from GHCR
          ssh -o StrictHostKeyChecking=no pi@$RPI_IP "\
            docker pull ghcr.io/${{ github.repository_owner }}/easyoref:latest && \
            cd /home/pi/easyoref && \
            docker-compose up -d bot"

      - name: Verify deployment
        run: |
          RPI_IP="${{ steps.get_rpi_ip.outputs.ip }}"
          for i in $(seq 1 10); do
            if ssh -o StrictHostKeyChecking=no pi@$RPI_IP "curl -sf http://localhost:3100/health" > /dev/null 2>&1; then
              echo "✅ EasyOref deployed and healthy"
              ssh -o StrictHostKeyChecking=no pi@$RPI_IP "curl -s http://localhost:3100/health"
              exit 0
            fi
            sleep 3
          done
          echo "❌ Health check failed"
          exit 1
