name: Release

on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  id-token: write # npm OIDC provenance
  contents: write # create tags + GitHub Releases
  packages: write # push Docker to GHCR
  pull-requests: write # changesets PR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # If there are changesets → open/update "Version Packages" PR
      # If that PR was just merged (no changesets left) → build + detect publish
      - uses: changesets/action@v1
        id: changesets
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          version: npm run version-bump
          publish: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Check if we need to publish ──────────────────────
      - name: Check unpublished version
        id: check-publish
        run: |
          LOCAL_VER=$(node -p "require('./packages/bot/package.json').version")
          NPM_VER=$(npm view easyoref version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL_VER" != "$NPM_VER" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "version=$LOCAL_VER" >> $GITHUB_OUTPUT
            echo "📦 Will publish easyoref@$LOCAL_VER (npm has $NPM_VER)"
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "✅ easyoref@$LOCAL_VER already on npm"
          fi

      # ── NPM Publish ──────────────────────────────────────
      - name: Build before publish
        if: steps.check-publish.outputs.should_publish == 'true'
        run: npm run build

      - name: Publish to NPM
        if: steps.check-publish.outputs.should_publish == 'true'
        run: npm publish -w packages/bot --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.check-publish.outputs.should_publish == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.check-publish.outputs.version }}';
            const tag = `v${version}`;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            });
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `easyoref@${version}`,
              generate_release_notes: true,
            });
            core.info(`Created release: ${release.html_url}`);

      # ── Docker (only on publish) ─────────────────────────
      - name: Docker login
        if: steps.check-publish.outputs.should_publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        if: steps.check-publish.outputs.should_publish == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.check-publish.outputs.version }}

      - name: Set up Buildx
        if: steps.check-publish.outputs.should_publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build & push Docker
        if: steps.check-publish.outputs.should_publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
