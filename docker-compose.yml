# EasyOref — Real-time Israeli Red Alert Filter Bot
services:
  easyoref:
    image: ghcr.io/mikhailkogan17/easyoref:latest
    build: .
    container_name: easyoref
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - easyoref-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3100/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  easyoref-data:
