# EasyOref — Real-time Israeli Red Alert Filter Bot
services:
  easyoref:
    image: ghcr.io/mikhailkogan17/easyoref:latest
    build: .
    container_name: easyoref
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3100:3100"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3100/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
